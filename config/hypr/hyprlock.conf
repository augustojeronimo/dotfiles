####################
###   HYPRLOCK   ###
####################


general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 1000
}

background {
    monitor =
    path = $WALLPAPER
    color = rgba(28,28,28, 1.0)
    blur_passes = 3
}

label {
    monitor =

    text = $TIME
    font_size = 100
    font_family = Jetbrains Mono Nerd Bold

    position = 0, 15%
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 15%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(ffccffee) rgba(ffffffee) 45deg
    check_color=rgba(ffccffee) rgba(ffccccee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(ffffff)
    fade_on_empty = true
    rounding = 1000

    position = 0, 0
    halign = center
    valign = center
}

