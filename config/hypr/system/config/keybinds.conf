####################
###   PROGRAMS   ###
####################


# Processes and Actions #

$terminal_run = kitty

$file_manager_run = $terminal_run yazi

$browser_run = google-chrome-stable

$locker_run = hyprlock

$picker_proc = hyprpicker
$picker_run = hyprpicker -a

$filter_toggle = pkill hyprsunset || hyprsunset -g 90 -t 4000

$bar_toggle = pkill -x waybar || waybar

$launcher_proc = fuzzel
$launcher_run = fuzzel
$launcher_toggle = pkill $launcher_proc || $launcher_run

$capture_window = hyprshot -m window --clipboard-only
$capture_fullscreen = hyprshot -m output -m active

$meta_menu_run = meta-menu

####################
###   KEYBINDS   ###
####################

# Launch Apps #

bind = SUPER, RETURN, exec, $terminal_run
bind = SUPER, F, exec, $file_manager_run
bind = SUPER, ESCAPE, exec, $bar_toggle
bind = SUPER, SPACE, exec, $launcher_toggle
bind = , PRINT, exec, $capture_window
bind = SHIFT, PRINT, exec, $capture_fullscreen
bind = SUPER, B, exec, $browser_run
bind = SUPER, Y, exec, $filter_toggle
bind = SUPER, L, exec, $locker_run

bind = SUPER, X, exec, $meta_menu_run

# System Control #

bind = SUPER, Q, killactive,
bind = SUPER, R, exec, hyprctl reload
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = SUPER, V, togglefloating,
bind = SUPER, TAB, layoutmsg, togglesplit # dwindle


# Windows #

#focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

#move
bind = SUPER SHIFT, LEFT, movewindow, l
bind = SUPER SHIFT, RIGHT, movewindow, r
bind = SUPER SHIFT, UP, movewindow, u
bind = SUPER SHIFT, DOWN, movewindow, d

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

#resize
binde = SUPER ALT, UP, resizeactive, 0 -30
binde = SUPER ALT, DOWN, resizeactive, 0 30
binde = SUPER ALT, LEFT, resizeactive, -30 0
binde = SUPER ALT, RIGHT, resizeactive, 30 0


# Workspaces #

#switch
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER, PRIOR, workspace, e-1
bind = SUPER, NEXT, workspace, e+1

bind = SUPER, S, togglespecialworkspace, magic

#move
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER SHIFT, PRIOR, movetoworkspace, e-1
bind = SUPER SHIFT, NEXT, movetoworkspace, e+1

bind = SUPER SHIFT, S, movetoworkspace, special:magic


# Multimedia keys #

#brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

#volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#media
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


