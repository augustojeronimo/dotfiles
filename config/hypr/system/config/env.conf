############################
###   ENVIRONMENT VARS   ###
############################


# Start PATH fix
$dotfiles = $HOME/dotfiles
$wallpapers = $HOME/wallpapers
$wallpaper = $wallpapers/current.png

## Dotfiles ##
env = DOTFILES, $dotfiles
env = PATH, /usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$dotfiles/bin

# Wallpapers directory #
env = WALLPAPERS, $wallpapers
env = WALLPAPER, $wallpaper

# ZSH config #
env = ZDOTDIR, $XDG_CONFIG_HOME/zsh

# System defaults #
env = EDITOR, nvim
env = TERMINAL, kitty

# Theme #
env = XCURSOR_SIZE, 	20
env = HYPRCURSOR_SIZE,	20


